<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:url('assets/images/BG.png') no-repeat center/cover;
  min-height:100vh;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h2{
  color:#0a8f5a;
}

.logout{
  background:#0a8f5a;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* FORM */
.form-box{
  background:white;
  padding:18px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  background:#0a8f5a;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

button:hover{
  background:#066b44;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:25px;
}

/* CARD */
.card{
  width:200px;
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* DELETE */
.delete-btn{
  margin-top:8px;
  background:red;
  padding:5px 10px;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("admin") !== "true"){
  window.location.href = "login.html";
}
</script>

<div class="header">
  <h2>Admin Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="sections"></div>

<script>

/* SECTIONS */
const sections = [
  "projects",
  "skills",
  "certs",
  "programs",
  "startups",
  "events",
  "hobbies",
  "prizes"
];

const container = document.getElementById("sections");

/* CREATE UI */
sections.forEach(key=>{
  container.innerHTML += `
    <div class="form-box">
      <h3>Add ${key}</h3>
      <input type="text" id="${key}Title" placeholder="Title">
      <input type="file" id="${key}File">
      <button onclick="addItem('${key}','${key}Title','${key}File')">Add</button>
    </div>

    <div class="grid" id="${key}List"></div>
  `;
});

/* STORAGE */
function getData(key){
  try{
    return JSON.parse(localStorage.getItem(key)) || [];
  }catch(e){
    return [];
  }
}

function saveData(key,data){
  localStorage.setItem(key, JSON.stringify(data));
}

/* ADD ITEM (FIXED) */
function addItem(key,titleId,fileId){

  const titleEl = document.getElementById(titleId);
  const fileEl = document.getElementById(fileId);

  const title = titleEl.value.trim();
  const file = fileEl.files[0];

  if(!title || !file){
    alert("Fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    let data = getData(key);

    data.push({
      title: title,
      file: e.target.result,
      type: file.type
    });

    saveData(key,data);

    titleEl.value = "";
    fileEl.value = "";

    display(key);
  };

  reader.onerror = function(){
    alert("File could not be read");
  };

  reader.readAsDataURL(file);
}

/* DISPLAY (SAFE VERSION) */
function display(key){

  const box = document.getElementById(key+"List");

  if(!box) return;

  const data = getData(key);
  box.innerHTML = "";

  if(data.length === 0){
    box.innerHTML = "<p>No items</p>";
    return;
  }

  data.forEach((item,i)=>{

    let content = "";

    if(item.type && item.type.startsWith("image")){
      content = `<img src="${item.file}">`;
    }
    else if(item.type && item.type.includes("pdf")){
      content = `<embed src="${item.file}" style="width:100%;height:140px;border-radius:10px;">`;
    }
    else{
      content = `<div style="height:120px;display:flex;align-items:center;justify-content:center;background:#eee;border-radius:10px;">File</div>`;
    }

    box.innerHTML += `
      <div class="card">
        ${content}
        <p>${item.title}</p>
        <button class="delete-btn" onclick="deleteItem('${key}',${i})">Delete</button>
      </div>
    `;
  });
}

/* DELETE */
function deleteItem(key,index){
  let data = getData(key);
  data.splice(index,1);
  saveData(key,data);
  display(key);
}

/* INIT (IMPORTANT FIX) */
window.addEventListener("DOMContentLoaded", function(){
  setTimeout(()=>{
    sections.forEach(display);
  },100);
});

/* LOGOUT */
function logout(){
  localStorage.removeItem("admin");
  window.location.href="index.html";
}

</script>

</body>
</html>
