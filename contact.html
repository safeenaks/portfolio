<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Safeena</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Poppins',sans-serif;
  background:url('assets/images/BG.png') no-repeat center/cover;
}

/* CENTER */
.contact {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2 {
  text-align:center;
  color:#0a8f5a;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea {
  height:120px;
  resize:none;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#0a8f5a;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#066b44;
}

.success {
  text-align:center;
  color:green;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="contact">
  <div class="box">
    <h2>Contact Me</h2>

  <form id="contactForm" onsubmit="sendMessage(event)">
  <input id="name" required placeholder="Name">
  <input id="email" required placeholder="Email">
  <textarea id="message" required></textarea>
  <button>Send</button>
</form>

    <p class="success" id="successMsg"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function sendMessage(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  db.collection("messages").add({
    name,
    email,
    message,
    time: new Date()
  })
  .then(()=>{
    alert("Message stored successfully!");
    document.getElementById("contactForm").reset();
  })
  .catch(err=>{
    alert("Error storing message");
    console.log(err);
  });
}
</script>

</body>
</html>
